<svg xmlns="http://www.w3.org/2000/svg" width="920" height="252" viewBox="0 0 920 252" role="img"><rect x="1" y="1" width="216" height="250" rx="12" fill="#f6f8fa" stroke="rgba(27,31,36,0.15)" stroke-width="1"/><circle cx="24" cy="25" r="11" fill="#2a78d6"/><text x="24" y="29.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#ffffff" font-weight="700" text-anchor="middle" font-style="normal">1</text><text x="42" y="29.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12.5" fill="#1f2328" font-weight="700" text-anchor="start" font-style="normal">One vote is a guess</text><text x="16" y="184" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10.8" fill="#57606a" font-weight="normal" text-anchor="start" font-style="normal">A single Gemini 2.5 Flash sample</text><text x="16" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10.8" fill="#57606a" font-weight="normal" text-anchor="start" font-style="normal">scores 68% on dev: a guess with no</text><text x="16" y="216" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10.8" fill="#57606a" font-weight="normal" text-anchor="start" font-style="normal">sense of its own difficulty.</text><rect x="235" y="1" width="216" height="250" rx="12" fill="#f6f8fa" stroke="rgba(27,31,36,0.15)" stroke-width="1"/><circle cx="258" cy="25" r="11" fill="#2a78d6"/><text x="258" y="29.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#ffffff" font-weight="700" text-anchor="middle" font-style="normal">2</text><text x="276" y="29.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12.5" fill="#1f2328" font-weight="700" text-anchor="start" font-style="normal">Votes reveal difficulty</text><text x="250" y="184" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10.8" fill="#57606a" font-weight="normal" text-anchor="start" font-style="normal">Eight votes at once: the margin is a</text><text x="250" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10.8" fill="#57606a" font-weight="normal" text-anchor="start" font-style="normal">free difficulty meter, from 85% on</text><text x="250" y="216" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10.8" fill="#57606a" font-weight="normal" text-anchor="start" font-style="normal">consensus down to 61% on ties.</text><rect x="469" y="1" width="216" height="250" rx="12" fill="#f6f8fa" stroke="rgba(27,31,36,0.15)" stroke-width="1"/><circle cx="492" cy="25" r="11" fill="#eda100"/><text x="492" y="29.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#ffffff" font-weight="700" text-anchor="middle" font-style="normal">3</text><text x="510" y="29.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12.5" fill="#1f2328" font-weight="700" text-anchor="start" font-style="normal">Compute follows doubt</text><text x="484" y="184" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10.8" fill="#57606a" font-weight="normal" text-anchor="start" font-style="normal">Confident cases exit at once; only</text><text x="484" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10.8" fill="#57606a" font-weight="normal" text-anchor="start" font-style="normal">split votes buy 24 more. 81% dev</text><text x="484" y="216" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10.8" fill="#57606a" font-weight="normal" text-anchor="start" font-style="normal">accuracy at 1.78 calls per case.</text><rect x="703" y="1" width="216" height="250" rx="12" fill="#f6f8fa" stroke="rgba(27,31,36,0.15)" stroke-width="1"/><circle cx="726" cy="25" r="11" fill="#4a3aa7"/><text x="726" y="29.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#ffffff" font-weight="700" text-anchor="middle" font-style="normal">4</text><text x="744" y="29.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12.5" fill="#1f2328" font-weight="700" text-anchor="start" font-style="normal">Theory breaks the ties</text><text x="718" y="184" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10.8" fill="#57606a" font-weight="normal" text-anchor="start" font-style="normal">Perfect ties (5% of cases) go to</text><text x="718" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10.8" fill="#57606a" font-weight="normal" text-anchor="start" font-style="normal">five signals from narrative theory:</text><text x="718" y="216" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10.8" fill="#57606a" font-weight="normal" text-anchor="start" font-style="normal">Propp, Freytag, TF-IDF and friends.</text><circle cx="109" cy="96" r="17" fill="#2a78d6"/><text x="109" y="101" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="700" text-anchor="middle" font-style="normal">A</text><text x="109" y="146" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="21" fill="#1f2328" font-weight="700" text-anchor="middle" font-style="normal">68%</text><text x="109" y="162" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helve